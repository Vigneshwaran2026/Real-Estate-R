<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #C9F31D;
            --dark: #092837;
            --light: #f5f7fa;
            --white: #ffffff;
            --gray: #6c757d;
        }

        body {
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.15;
            animation: float 15s infinite linear;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; width: 8px; height: 8px; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; width: 4px; height: 4px; }
        .particle:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; top: 10%; animation-delay: 1s; width: 10px; height: 10px; }
        .particle:nth-child(5) { left: 50%; top: 60%; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(6) { left: 60%; top: 30%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; top: 70%; animation-delay: 1.5s; width: 7px; height: 7px; }
        .particle:nth-child(8) { left: 80%; top: 15%; animation-delay: 2.5s; width: 4px; height: 4px; }
        .particle:nth-child(9) { left: 90%; top: 50%; animation-delay: 3.5s; }
        .particle:nth-child(10) { left: 15%; top: 55%; animation-delay: 4.5s; width: 6px; height: 6px; }
        .particle:nth-child(11) { left: 45%; top: 85%; animation-delay: 0.5s; width: 5px; height: 5px; }
        .particle:nth-child(12) { left: 75%; top: 25%; animation-delay: 2.2s; width: 8px; height: 8px; }
        .particle:nth-child(13) { left: 5%; top: 90%; animation-delay: 1.8s; width: 4px; height: 4px; }
        .particle:nth-child(14) { left: 85%; top: 5%; animation-delay: 3.8s; width: 6px; height: 6px; }
        .particle:nth-child(15) { left: 55%; top: 45%; animation-delay: 5.5s; width: 5px; height: 5px; }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0.15; }
            25% { transform: translateY(-30px) translateX(15px); opacity: 0.3; }
            50% { transform: translateY(-60px) translateX(-10px); opacity: 0.15; }
            75% { transform: translateY(-30px) translateX(20px); opacity: 0.25; }
            100% { transform: translateY(0) translateX(0); opacity: 0.15; }
        }

        /* Grid lines background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(201,243,29,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,243,29,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Main container */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px 20px;
            max-width: 700px;
            width: 100%;
        }

        /* 404 Number */
        .error-code {
            font-size: 180px;
            font-weight: 900;
            line-height: 1;
            color: var(--primary);
            text-shadow: 0 0 60px rgba(201,243,29,0.3), 0 0 120px rgba(201,243,29,0.1);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .error-code::before {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            color: transparent;
            -webkit-text-stroke: 2px rgba(201,243,29,0.2);
            z-index: -1;
            transform: translate(6px, 6px);
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 60px rgba(201,243,29,0.3), 0 0 120px rgba(201,243,29,0.1); }
            50% { text-shadow: 0 0 80px rgba(201,243,29,0.5), 0 0 160px rgba(201,243,29,0.2); }
        }

        /* Error title */
        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        /* Error message */
        .error-message {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Search box */
        .search-box {
            display: flex;
            max-width: 480px;
            margin: 0 auto 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(201,243,29,0.15);
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            background: transparent;
            border: none;
            color: var(--white);
            font-size: 15px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .search-box button {
            padding: 0 24px;
            background: var(--primary);
            border: none;
            color: var(--dark);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-box button:hover {
            background: #b8e018;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--dark);
            border: none;
        }

        .btn-primary:hover {
            background: #b8e018;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(201,243,29,0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* Decorative elements */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,243,29,0.1);
            z-index: 1;
        }

        .decor-circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation: rotate 30s linear infinite;
        }

        .decor-circle-2 {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -80px;
            animation: rotate 25s linear infinite reverse;
        }

        .decor-circle-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(201,243,29,0.05);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* House icon animation */
        .house-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code { font-size: 120px; }
            .error-title { font-size: 24px; }
            .error-message { font-size: 14px; }
            .btn { padding: 12px 24px; font-size: 14px; }
            .search-box { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 90px; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Background elements -->
    <div class="grid-bg"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="decor-circle decor-circle-1"></div>
    <div class="decor-circle decor-circle-2"></div>
    <div class="decor-circle decor-circle-3"></div>

    <!-- Main content -->
    <div class="container">
        <div class="house-icon">
            <i class="fas fa-home"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            Oops! The page you are looking for seems to have moved, been deleted, or never existed. 
            Let us help you find your way back home.
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
    <i class="fas fa-arrow-left"></i> Go Back
</a>
        </div>
    </div>

</body>
</html>
